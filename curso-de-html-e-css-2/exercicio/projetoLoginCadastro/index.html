<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="formulario-box login">
            <form>
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Nome" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="esqueci-link">
                    <a href="#">Esqueceu sua senha</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>Ou faça login em nossa plataformas</p>
                <div class="social-icones">
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </form>
        </div>

         <div class="formulario-box Cadastro">
            <form>
                <h1>Cadastro</h1>
                <div class="input-box">
                    <input type="text" placeholder="Nome" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="E-mail" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Senha" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="esqueci-link">
                    <a href="#">Esqueceu sua senha</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <p>Ou faça Cadastro em nossa plataformas</p>
                <div class="social-icones">
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </form>
        </div>
        <div class="alterar-box">
            <div class="alterar-painel alterar-esquerda">
                <h1>Hello, Welcome!</h1>
                <p>Não tem uma conta?</p>
                <button class="btn Cadastrar-btn">Cadastrar</button>
            </div>

            <div class="alterar-painel alterar-direita">
                <h1>bem-vindo de volta!</h1>
                <p>Já possui uma conta?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
