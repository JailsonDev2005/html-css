<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar formulario</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <main>
        <div class="container">
            <div class="cabeca">
                <h1>Criar conta</h1>
                <button id="b2"><i class="fa-solid fa-right-to-bracket"></i></button>
            </div>
            <form>
                <div class="form-container">
                    <div class="formInput">
                        <label for="inome">Nome</label>
                        <div class="Input-box">
                            <input type="text" name="nome" id="inome" placeholder="Nome">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>
                    <div class="formInput">
                        <label for="iSobrenome">Sobrenome</label>
                        <div class="Input-box">
                            <input type="text" name="Sobrenome" id="iSobrenome" placeholder="Sobrenome">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </div>
                    <div class="formInput">
                        <label for="iNas">Nascimento</label>
                        <div class="Input-box">
                            <input type="date" name="Nas" id="iNas" placeholder="Sobrenome">
                        </div>
                    </div>
                    <div class="formInput">
                        <label for="iemail">E-mail</label>
                        <div class="Input-box">
                            <input type="email" name="email" id="iemail" placeholder="Exemplo@gmail.com">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                    </div>
                    <div class="formInput">
                        <label for="iSen">Senha</label>
                        <div class="Input-box">
                            <input type="password" name="Sen" id="iSen" placeholder="Senha">
                            <i class="fa-solid fa-eye-slash password-icon"></i>
                        </div>
                    </div>
                    <div class="formInput">
                        <label for="iSenCon">Confirmar Senha</label>
                        <div class="Input-box">
                            <input type="password" name="SenCon" id="iSenCon" placeholder="Confrimar Senha">
                            <i class="fa-solid fa-eye-slash password-icon"></i>
                        </div>
                    </div>
                </div>
                <div class="genero">
                    <p>Gênero</p>
                    <div class="gcontainer">
                        <div class="genero-box">
                            <input type="radio" name="gender" id="If" value="feminino">
                            <label for="if" class="label">Feminino</label>
                        </div>
                        <div class="genero-box">
                            <input type="radio" name="gender" id="Ic" value="masculino">
                            <label for="ic" class="label">Masculino</label>
                        </div>
                        <div class="genero-box">
                            <input type="radio" name="gender" id="Io" value="outros">
                            <label for="io" class="label">Outros</label>
                        </div>
                                    
                    </div>
                </div>
                <button type="submit" id="b1"><I class="fa-solid fa-check" "></I>Criar conta</button>
            </form>
        </div>
    </main>
</body>
</html>
