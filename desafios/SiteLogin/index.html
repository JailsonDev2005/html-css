<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>LOGO</h1>
            </div>

            <nav>
                <a href="#">Inicio</a>
                <a href="#">Sobre</a>
                <a href="#">Serviços</a>
                <a href="#">Contatos</a>

                <div class="EntLogin" id="EntLogin">
                    <button>Login</button>
                </div>
            </nav>


        </div>
    </header>
    <main>
        
        <div class="form-container login" id="login">
            <form>
                <h2>Login</h2>
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Senha">
                <p><a href="#">Esqueceu sua senha?</a></p>
                <button>Login</button>
                <p>Não tenho uma conta? <a href="#" id="btnCadastro">Cadastrar</a></p>
            </form>
        </div>

        <div class="form-container cadastro" id="cadastro">
            <form>
                <h2>Cadastro</h2>
                <input type="email" placeholder="Email">
                <input type="text" placeholder="Nome">
                <input type="password" placeholder="Senha">
                <button>Cadastrar</button>
                <p>ja tem uma conta? <a href="#" id="entrar" onclick="mudalogin()">Entrar</a></p>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
