<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive NavBar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <nav>
        <ul class="sidebar">
            <li onclick="hiderSidebar()"><a href="#" class="menubar"><i class="fa-solid fa-xmark"></i></a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Forum</a></li>
            <li><a href="#">Login</a></li>
        </ul>
        <ul>
            <li><a href="#">Coding</a></li>
            <li><a href="#" class="hiderOnMobile">Blog</a></li>
            <li><a href="#" class="hiderOnMobile">Products</a></li>
            <li><a href="#" class="hiderOnMobile">About</a></li>
            <li><a href="#" class="hiderOnMobile">Forum</a></li>
            <li><a href="#" class="hiderOnMobile">Login</a></li>
            <li class="menu-buttom" onclick="showSidebar()"><a href="#" class="menubar"><i class="fa-solid fa-bars"></i></a></li>
        </ul>
    </nav>

    <script src="script.js"></script>
</body>
</html>
